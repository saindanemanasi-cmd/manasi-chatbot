<!DOCTYPE html>
<html>
<head>
<title>Manasi ChatBot</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#f7d9e3,#d6eaff,#e6f7e6);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:550px;
    background:white;
    border-radius:20px;
    box-shadow:0px 10px 30px rgba(0,0,0,0.2);
    padding:20px;
}

h2{
    text-align:center;
}

.chatbox{
    border:1px solid #eee;
    border-radius:12px;
    padding:15px;
    height:300px;
    overflow-y:auto;
    background:#fafafa;
    margin-bottom:15px;
}

.user{
    text-align:right;
    margin:8px;
}

.bot{
    text-align:left;
    margin:8px;
    color:#6a5acd;
}

.input-area{
    display:flex;
}

input{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    margin-left:10px;
    padding:12px 18px;
    background:#b8a4f0;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#9a85ea;
}

</style>
</head>

<body>

<div class="container">

<h2>Manasi ChatBot 🤖</h2>

<div class="chatbox" id="chatbox"></div>

<div class="input-area">
<input id="userInput" placeholder="Ask something...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

function send(){

let input = document.getElementById("userInput").value

if(input==="") return

document.getElementById("chatbox").innerHTML +=
"<div class='user'><b>You:</b> "+input+"</div>"

fetch("/get?msg="+input)
.then(response=>response.text())
.then(data=>{

document.getElementById("chatbox").innerHTML +=
"<div class='bot'><b>ManasiBot:</b> "+data+"</div>"

document.getElementById("chatbox").scrollTop =
document.getElementById("chatbox").scrollHeight

})

document.getElementById("userInput").value=""

}

</script>

</body>
</html>
